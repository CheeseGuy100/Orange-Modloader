name: Build Orange ModLoader

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # Also lets you trigger manually from GitHub
  workflow_dispatch:

jobs:

  # ================================
  # Build Android APK
  # ================================
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: modframework-ui

      - name: Build Debug APK
        run: ./gradlew :composeApp:assembleDebug
        working-directory: modframework-ui

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: orange-modloader-android
          path: modframework-ui/composeApp/build/outputs/apk/debug/*.apk

  # ================================
  # Build Windows EXE
  # ================================
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Windows MSI installer
        run: ./gradlew :composeApp:packageMsi
        working-directory: modframework-ui

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: orange-modloader-windows
          path: modframework-ui/composeApp/build/compose/binaries/main/msi/*.msi

  # ================================
  # Build Linux DEB
  # ================================
  build-linux:
    name: Build Linux Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: modframework-ui

      - name: Build Linux DEB
        run: ./gradlew :composeApp:packageDeb
        working-directory: modframework-ui

      - name: Upload Linux package
        uses: actions/upload-artifact@v4
        with:
          name: orange-modloader-linux
          path: modframework-ui/composeApp/build/compose/binaries/main/deb/*.deb

  # ================================
  # Build Mac DMG
  # ================================
  build-mac:
    name: Build Mac DMG
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Mac DMG
        run: ./gradlew :composeApp:packageDmg
        working-directory: modframework-ui

      - name: Upload Mac DMG
        uses: actions/upload-artifact@v4
        with:
          name: orange-modloader-mac
          path: modframework-ui/composeApp/build/compose/binaries/main/dmg/*.dmg
