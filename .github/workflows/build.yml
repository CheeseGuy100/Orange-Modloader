name: Build MangoLoader

on:
  push:
    branches: [ main ]
  release:
    types: [ created ]

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > modframework-ui/composeApp/mangoloader.jks
      - name: Build Signed APK
        working-directory: modframework-ui
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: gradle composeApp:assembleRelease -Pandroid.injected.signing.store.file=../composeApp/mangoloader.jks -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD -Pandroid.injected.signing.key.alias=$KEY_ALIAS -Pandroid.injected.signing.key.password=$KEYSTORE_PASSWORD
      - name: Rename APK
        run: mv modframework-ui/composeApp/build/outputs/apk/release/composeApp-release.apk modframework-ui/composeApp/build/outputs/apk/release/MangoLoader-${{ github.ref_name }}.apk
      - name: Upload APK to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: modframework-ui/composeApp/build/outputs/apk/release/MangoLoader-${{ github.ref_name }}.apk

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'
      - name: Build MSI
        working-directory: modframework-ui
        run: gradle packageMsi
      - name: Upload MSI to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: modframework-ui/composeApp/build/compose/binaries/main/msi/*.msi
